<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0284c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Bag Background / App Icon -->
  <rect x="150" y="100" width="300" height="300" rx="80" ry="80" fill="url(#bgGrad)" />

  <!-- Bag Body -->
  <path d="M 230 250 L 220 350 C 220 365 230 375 245 375 L 355 375 C 370 375 380 365 380 350 L 370 250 Z" fill="white" filter="url(#shadow)"/>
  
  <!-- Bag Handle -->
  <path d="M 265 260 L 265 210 C 265 185 335 185 335 210 L 335 260" fill="none" stroke="white" stroke-width="24" stroke-linecap="round"/>
  
  <!-- Checkmark -->
  <path d="M 270 310 L 295 335 L 345 270" fill="none" stroke="url(#bgGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Logo Text -->
  <text x="300" y="480" font-family="'Inter', 'Segoe UI', sans-serif" font-size="85" font-weight="800" text-anchor="middle" fill="url(#textGrad)" letter-spacing="-2">Novapay</text>
</svg>
